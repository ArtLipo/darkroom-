<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PIXELSORT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0a;
    --fg: #e8e0d0;
    --accent: #ff3c00;
    --dim: #333;
    --mid: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--dim);
    flex-shrink: 0;
  }

  #title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--fg);
  }

  #status {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    animation: blink 1.4s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  #viewfinder {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60px; height: 60px;
    pointer-events: none;
    opacity: 0.6;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: var(--fg);
  }
  #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  #crosshair::after  { width: 100%; height: 1px; top: 50%; left: 0; }

  .corner {
    position: absolute;
    width: 14px; height: 14px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.8;
  }
  .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

  #scanline {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
    animation: scan 3s linear infinite;
    pointer-events: none;
  }
  @keyframes scan { from { top: 0; } to { top: 100%; } }

  #params {
    padding: 10px 16px;
    border-top: 1px solid var(--dim);
    border-bottom: 1px solid var(--dim);
    flex-shrink: 0;
  }

  .param-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .param-row:last-child { margin-bottom: 0; }

  .param-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--mid);
    width: 80px;
    flex-shrink: 0;
  }

  .param-value {
    font-size: 11px;
    color: var(--accent);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: var(--dim);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 0;
    cursor: pointer;
  }

  #dir-toggle {
    display: flex;
    gap: 6px;
    flex: 1;
  }
  .dir-btn {
    flex: 1;
    padding: 4px 0;
    background: none;
    border: 1px solid var(--dim);
    color: var(--mid);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .dir-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  #controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    flex-shrink: 0;
    gap: 12px;
  }

  #btn-flip {
    width: 44px; height: 44px;
    background: none;
    border: 1px solid var(--dim);
    color: var(--mid);
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }
  #btn-flip:active { border-color: var(--accent); color: var(--accent); }

  #btn-retake {
    width: 44px; height: 44px;
    background: none;
    border: 1px solid var(--dim);
    color: var(--mid);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
  }
  #btn-retake.visible { display: flex; }

  #btn-shoot {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: var(--fg);
    border: 3px solid var(--dim);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: transform 0.1s;
  }
  #btn-shoot:active { transform: scale(0.93); }
  #btn-shoot::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 54px; height: 54px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--accent);
  }

  #btn-save {
    width: 44px; height: 44px;
    background: none;
    border: 1px solid var(--dim);
    color: var(--mid);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
  }
  #btn-save.visible { display: flex; }

  #processing {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 10;
  }
  #processing.active { display: flex; }
  #proc-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    animation: blink 0.6s step-end infinite;
  }
  #proc-bar-wrap { width: 160px; height: 2px; background: var(--dim); }
  #proc-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.05s linear; }

  #flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.15s;
  }
  #flash.on { opacity: 1; }

  #hidden-canvas { display: none; }

  /* PRESETS */
  #presets {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--dim);
    flex-shrink: 0;
  }
  .preset-btn {
    flex: 1;
    padding: 5px 0;
    background: none;
    border: 1px solid var(--dim);
    color: var(--mid);
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<div id="header">
  <div id="title">PIXELSORT</div>
  <div id="status">● REC</div>
</div>

<div id="viewfinder">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="crosshair"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="scanline"></div>
  <div id="processing">
    <div id="proc-label">PROCESSING</div>
    <div id="proc-bar-wrap"><div id="proc-bar"></div></div>
  </div>
  <div id="flash"></div>
</div>

<div id="presets">
  <button class="preset-btn" data-preset="kreski">KRESKI</button>
  <button class="preset-btn" data-preset="sylwetka">SYLWETKA</button>
  <button class="preset-btn" data-preset="deszcz">DESZCZ</button>
  <button class="preset-btn" data-preset="kolor">KOLOR</button>
  <button class="preset-btn" data-preset="drżenie">DRŻENIE</button>
  <button class="preset-btn" data-preset="mięso">MIĘSO</button>
  <button class="preset-btn" data-preset="paski">PASKI</button>
  <button class="preset-btn" data-preset="sen">ZŁY SEN</button>
</div>

<div id="params">
  <div class="param-row" id="row-threshold">
    <span class="param-label">THRESHOLD</span>
    <input type="range" id="sl-threshold" min="0" max="255" value="80">
    <span class="param-value" id="val-threshold">80</span>
  </div>
  <div class="param-row">
    <span class="param-label">INTENSITY</span>
    <input type="range" id="sl-intensity" min="0" max="100" value="60">
    <span class="param-value" id="val-intensity">60</span>
  </div>
  <div class="param-row" id="dir-row">
    <span class="param-label">DIRECTION</span>
    <div id="dir-toggle">
      <button class="dir-btn active" data-dir="horizontal">HORIZ</button>
      <button class="dir-btn" data-dir="vertical">VERT</button>
      <button class="dir-btn" data-dir="both">BOTH</button>
    </div>
  </div>
  <div class="param-row" id="row-extra1" style="display:none">
    <span class="param-label" id="label-extra1">PARAM 1</span>
    <input type="range" id="sl-extra1" min="1" max="50" value="10">
    <span class="param-value" id="val-extra1">10</span>
  </div>
  <div class="param-row" id="row-extra2" style="display:none">
    <span class="param-label" id="label-extra2">PARAM 2</span>
    <input type="range" id="sl-extra2" min="1" max="50" value="5">
    <span class="param-value" id="val-extra2">5</span>
  </div>
</div>

<div id="controls">
  <button id="btn-flip">⟳</button>
  <button id="btn-shoot"></button>
  <button id="btn-retake">↺<br>RETAKE</button>
  <button id="btn-save">↓<br>SAVE</button>
</div>

<canvas id="hidden-canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hiddenCanvas = document.getElementById('hidden-canvas');
const hCtx = hiddenCanvas.getContext('2d');
const btnShoot = document.getElementById('btn-shoot');
const btnRetake = document.getElementById('btn-retake');
const btnSave = document.getElementById('btn-save');
const btnFlip = document.getElementById('btn-flip');
const processing = document.getElementById('processing');
const procBar = document.getElementById('proc-bar');
const flash = document.getElementById('flash');
const statusEl = document.getElementById('status');

let direction = 'horizontal';
let hasPhoto = false;
let facingMode = 'environment';
let bw = false;

// Presets
const PRESETS = {
  kreski:   { threshold: 180, intensity: 30, dir: 'horizontal', bw: true },
  sylwetka: { threshold: 210, intensity: 45, dir: 'horizontal', bw: true },
  deszcz:   { threshold: 100, intensity: 85, dir: 'both',       bw: true },
  kolor:    { threshold: 80,  intensity: 60, dir: 'horizontal', bw: false },
  'drżenie':{ threshold: 80,  intensity: 60, dir: 'horizontal', bw: false },
  'mięso':  { threshold: 80,  intensity: 60, dir: 'horizontal', bw: false },
  paski:    { threshold: 80,  intensity: 60, dir: 'horizontal', bw: false },
  sen:      { threshold: 80,  intensity: 60, dir: 'horizontal', bw: false },
};

const FILTER_TYPE = {
  kreski: 'pixelsort', sylwetka: 'pixelsort', deszcz: 'pixelsort', kolor: 'pixelsort',
  'drżenie': 'drzenie', 'mięso': 'mieso', paski: 'paski', sen: 'sen'
};

const EXTRA_PARAMS = {
  paski: { e1: { label: 'SZEROKOŚĆ', min:1, max:30, val:5 }, e2: { label: 'PRZESUNIĘCIE', min:1, max:100, val:30 } },
  sen:   { e1: { label: 'FRAGMENTY', min:2, max:20, val:8 }, e2: { label: 'CHAOS', min:1, max:10, val:5 } },
};

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  document.getElementById('sl-threshold').value = p.threshold;
  document.getElementById('val-threshold').textContent = p.threshold;
  document.getElementById('sl-intensity').value = p.intensity;
  document.getElementById('val-intensity').textContent = p.intensity;
  direction = p.dir;
  bw = p.bw;
  document.querySelectorAll('.dir-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.dir === p.dir);
  });
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.preset === name);
  });
}

let activeFilter = 'pixelsort';

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const name = btn.dataset.preset;
    activeFilter = FILTER_TYPE[name] || 'pixelsort';
    applyPreset(name);
    const rowT = document.getElementById('row-threshold');
    const rowDir = document.getElementById('dir-row');
    const rowE1 = document.getElementById('row-extra1');
    const rowE2 = document.getElementById('row-extra2');
    const noThreshold = ['drzenie','mieso','paski','sen'].includes(activeFilter);
    rowT.style.display = noThreshold ? 'none' : 'flex';
    rowDir.style.display = activeFilter === 'pixelsort' ? 'flex' : 'none';
    const ep = EXTRA_PARAMS[name];
    if (ep) {
      document.getElementById('label-extra1').textContent = ep.e1.label;
      document.getElementById('sl-extra1').min = ep.e1.min;
      document.getElementById('sl-extra1').max = ep.e1.max;
      document.getElementById('sl-extra1').value = ep.e1.val;
      document.getElementById('val-extra1').textContent = ep.e1.val;
      document.getElementById('label-extra2').textContent = ep.e2.label;
      document.getElementById('sl-extra2').min = ep.e2.min;
      document.getElementById('sl-extra2').max = ep.e2.max;
      document.getElementById('sl-extra2').value = ep.e2.val;
      document.getElementById('val-extra2').textContent = ep.e2.val;
      rowE1.style.display = 'flex';
      rowE2.style.display = 'flex';
    } else {
      rowE1.style.display = 'none';
      rowE2.style.display = 'none';
    }
  });
});

function applyDisplacement(imageData, intensity) {
  const w = imageData.width, h = imageData.height;
  const src = new Uint8ClampedArray(imageData.data);
  const d = imageData.data;
  const radius = Math.floor(intensity / 10) + 2;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const dx = Math.floor((Math.random() * 2 - 1) * radius);
      const dy = Math.floor((Math.random() * 2 - 1) * radius);
      const sx = Math.max(0, Math.min(w-1, x + dx));
      const sy = Math.max(0, Math.min(h-1, y + dy));
      const dst = (y*w+x)*4;
      const s = (sy*w+sx)*4;
      d[dst] = src[s]; d[dst+1] = src[s+1]; d[dst+2] = src[s+2];
    }
  }
  return imageData;
}

async function startCamera() {
  // zatrzymaj poprzedni strumień
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
  } catch(e) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream;
    } catch(e2) {
      alert('Brak dostępu do kamery.');
    }
  }
}
startCamera();

// Przełączanie kamery
btnFlip.addEventListener('click', () => {
  if (hasPhoto) return;
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

// Sliders
function bindSlider(id, valId) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => { vl.textContent = sl.value; });
}
bindSlider('sl-threshold', 'val-threshold');
bindSlider('sl-intensity', 'val-intensity');
bindSlider('sl-extra1', 'val-extra1');
bindSlider('sl-extra2', 'val-extra2');

// Direction
document.querySelectorAll('.dir-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    direction = btn.dataset.dir;
  });
});

function getLuminance(r, g, b) {
  return 0.299 * r + 0.587 * g + 0.114 * b;
}

function sortRow(data, width, y, threshold, intensity) {
  const offset = y * width * 4;
  let i = 0;
  while (i < width) {
    const lum = getLuminance(data[offset+i*4], data[offset+i*4+1], data[offset+i*4+2]);
    if (lum > threshold) {
      let j = i;
      while (j < width && getLuminance(data[offset+j*4], data[offset+j*4+1], data[offset+j*4+2]) > threshold) j++;
      const seg = [];
      for (let k = i; k < j; k++) {
        seg.push({ r: data[offset+k*4], g: data[offset+k*4+1], b: data[offset+k*4+2], lum: getLuminance(data[offset+k*4], data[offset+k*4+1], data[offset+k*4+2]) });
      }
      seg.sort((a,b) => a.lum - b.lum);
      const applyCount = Math.floor(seg.length * intensity / 100);
      for (let k = 0; k < applyCount; k++) {
        data[offset+(i+k)*4] = seg[k].r;
        data[offset+(i+k)*4+1] = seg[k].g;
        data[offset+(i+k)*4+2] = seg[k].b;
      }
      i = j;
    } else { i++; }
  }
}

function sortColumn(data, width, height, x, threshold, intensity) {
  let i = 0;
  while (i < height) {
    const lum = getLuminance(data[(i*width+x)*4], data[(i*width+x)*4+1], data[(i*width+x)*4+2]);
    if (lum > threshold) {
      let j = i;
      while (j < height && getLuminance(data[(j*width+x)*4], data[(j*width+x)*4+1], data[(j*width+x)*4+2]) > threshold) j++;
      const seg = [];
      for (let k = i; k < j; k++) {
        seg.push({ r: data[(k*width+x)*4], g: data[(k*width+x)*4+1], b: data[(k*width+x)*4+2], lum: getLuminance(data[(k*width+x)*4], data[(k*width+x)*4+1], data[(k*width+x)*4+2]) });
      }
      seg.sort((a,b) => a.lum - b.lum);
      const applyCount = Math.floor(seg.length * intensity / 100);
      for (let k = 0; k < applyCount; k++) {
        data[((i+k)*width+x)*4] = seg[k].r;
        data[((i+k)*width+x)*4+1] = seg[k].g;
        data[((i+k)*width+x)*4+2] = seg[k].b;
      }
      i = j;
    } else { i++; }
  }
}

function applyPixelSort(imageData, threshold, intensity, dir) {
  const w = imageData.width, h = imageData.height;
  if (dir === 'horizontal' || dir === 'both') for (let y = 0; y < h; y++) sortRow(imageData.data, w, y, threshold, intensity);
  if (dir === 'vertical' || dir === 'both') for (let x = 0; x < w; x++) sortColumn(imageData.data, w, h, x, threshold, intensity);
  return imageData;
}

function applyMieso(imageData, intensity) {
  const w = imageData.width, h = imageData.height;
  const d = imageData.data;
  const str = intensity / 100;
  for (let i = 0; i < d.length; i += 4) {
    const x = (i/4) % w, y = Math.floor((i/4) / w);
    const l = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    const n1 = Math.sin(x*0.4 + y*0.2) * Math.cos(x*0.1 - y*0.3);
    const n2 = Math.sin(x*0.15 + y*0.08 + 1.5) * Math.cos(y*0.12);
    const n = ((n1 + n2) * 0.5) * 0.5 + 0.5;
    const vein = Math.abs(Math.sin(x*0.6 + y*0.4)) < 0.04 ? 0.35 : 1;
    d[i]   = Math.min(255, (l * (1 + str*0.4) + n * str * 90)) * vein;
    d[i+1] = Math.min(255, (l * (1 - str*0.5) + n * str * 20)) * vein;
    d[i+2] = Math.min(255, (l * (1 - str*0.7) + n * str * 15)) * vein;
  }
  return imageData;
}

function applyPaski(imageData, bandHeight, maxShift) {
  const w = imageData.width, h = imageData.height;
  const src = new Uint8ClampedArray(imageData.data);
  const d = imageData.data;
  let y = 0;
  while (y < h) {
    const bh = Math.max(1, Math.floor(bandHeight * (0.5 + Math.random())));
    const shift = Math.random() > 0.5 ? Math.floor((Math.random() * 2 - 1) * maxShift) : 0;
    for (let row = y; row < Math.min(y + bh, h); row++) {
      for (let x = 0; x < w; x++) {
        const sx = Math.max(0, Math.min(w-1, x - shift));
        const dst = (row*w+x)*4, s = (row*w+sx)*4;
        d[dst]=src[s]; d[dst+1]=src[s+1]; d[dst+2]=src[s+2];
      }
    }
    y += bh;
  }
  return imageData;
}

function applySen(imageData, pieces, chaos) {
  const w = imageData.width, h = imageData.height;
  const src = new Uint8ClampedArray(imageData.data);
  const d = imageData.data;
  const pw = Math.floor(w / pieces), ph = Math.floor(h / pieces);
  const positions = [];
  for (let r = 0; r < pieces; r++)
    for (let c = 0; c < pieces; c++)
      positions.push([r, c]);
  const shuffled = [...positions];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const range = Math.max(1, Math.floor(chaos * shuffled.length / 10));
    const j = Math.max(0, i - Math.floor(Math.random() * range));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  for (let i = 0; i < positions.length; i++) {
    const [fr, fc] = positions[i], [tr, tc] = shuffled[i];
    for (let y = 0; y < ph; y++) {
      for (let x = 0; x < pw; x++) {
        const dst = ((tr*ph+y)*w + tc*pw+x)*4;
        const s   = ((fr*ph+y)*w + fc*pw+x)*4;
        d[dst]=src[s]; d[dst+1]=src[s+1]; d[dst+2]=src[s+2];
      }
    }
  }
  return imageData;
}

function animateProgress(duration, cb) {
  const start = performance.now();
  function step(now) {
    const pct = Math.min(100, ((now - start) / duration) * 100);
    procBar.style.width = pct + '%';
    if (pct < 100) requestAnimationFrame(step);
    else cb();
  }
  requestAnimationFrame(step);
}

btnShoot.addEventListener('click', () => {
  if (hasPhoto) return;
  flash.classList.add('on');
  setTimeout(() => flash.classList.remove('on'), 150);

  const vw = video.videoWidth || 640;
  const vh = video.videoHeight || 480;
  hiddenCanvas.width = vw;
  hiddenCanvas.height = vh;
  hCtx.drawImage(video, 0, 0, vw, vh);

  processing.classList.add('active');
  procBar.style.width = '0%';
  statusEl.textContent = '● PROCESSING';

  const threshold = parseInt(document.getElementById('sl-threshold').value);
  const intensity = parseInt(document.getElementById('sl-intensity').value);

  setTimeout(() => {
    const imageData = hCtx.getImageData(0, 0, vw, vh);
    // BW conversion
    if (bw) {
      const d = imageData.data;
      for (let i = 0; i < d.length; i += 4) {
        const g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
        d[i] = d[i+1] = d[i+2] = g;
      }
    }
    animateProgress(800, () => {
      const extra1 = parseInt(document.getElementById('sl-extra1').value);
      const extra2 = parseInt(document.getElementById('sl-extra2').value);
      if (activeFilter === 'drzenie') {
        applyDisplacement(imageData, intensity);
      } else if (activeFilter === 'mieso') {
        applyMieso(imageData, intensity);
      } else if (activeFilter === 'paski') {
        applyPaski(imageData, extra1, extra2);
      } else if (activeFilter === 'sen') {
        applySen(imageData, extra1, extra2);
      } else {
        applyPixelSort(imageData, threshold, intensity, direction);
      }
      hCtx.putImageData(imageData, 0, 0);
      canvas.width = vw;
      canvas.height = vh;
      ctx.drawImage(hiddenCanvas, 0, 0);
      video.style.display = 'none';
      canvas.style.display = 'block';
      document.getElementById('scanline').style.display = 'none';
      document.getElementById('crosshair').style.display = 'none';
      processing.classList.remove('active');
      statusEl.textContent = '● READY';
      btnRetake.classList.add('visible');
      btnSave.classList.add('visible');
      btnFlip.style.display = 'none';
      hasPhoto = true;
    });
  }, 50);
});

btnRetake.addEventListener('click', () => {
  canvas.style.display = 'none';
  video.style.display = 'block';
  document.getElementById('scanline').style.display = 'block';
  document.getElementById('crosshair').style.display = 'block';
  btnRetake.classList.remove('visible');
  btnSave.classList.remove('visible');
  btnFlip.style.display = 'flex';
  statusEl.textContent = '● REC';
  hasPhoto = false;
});

btnSave.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'pixelsort_' + Date.now() + '.jpg';
  link.href = hiddenCanvas.toDataURL('image/jpeg', 0.92);
  link.click();
});
</script>
